name: Unit Tests

on:
  push:
    branches: [main, task-1, task-2, task3-yolo, task4-analytics, task5-dagster]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest httpx fastapi sqlalchemy python-dotenv pydantic psycopg2-binary

      - name: Run API unit tests
        run: pytest tests/test_api.py -v

      - name: Validate dbt project parses
        run: |
          pip install dbt-postgres
          cd medical_warehouse
          dbt parse --profiles-dir .
